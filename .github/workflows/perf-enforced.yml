name: perf-enforced

on:
  workflow_call:

jobs:
  perf-enforced:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Detect pnpm project
        id: pnpm-project
        shell: bash
        run: |
          for dir in ui client app web frontend .; do
            if [ -f "$dir/pnpm-lock.yaml" ]; then
              echo "dir=$dir" >> "$GITHUB_OUTPUT"
              if [ -f "$dir/package.json" ] && node -e 'const pkg=require(process.argv[1]); process.exit(String(pkg.packageManager || "").startsWith("pnpm@") ? 0 : 1)' "$dir/package.json"; then
                echo "has_package_manager=true" >> "$GITHUB_OUTPUT"
              else
                echo "has_package_manager=false" >> "$GITHUB_OUTPUT"
              fi
              exit 0
            fi
          done
          echo "dir=" >> "$GITHUB_OUTPUT"
          echo "has_package_manager=false" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm from packageManager
        if: steps.pnpm-project.outputs.dir != '' && steps.pnpm-project.outputs.has_package_manager == 'true'
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          package_json_file: ${{ steps.pnpm-project.outputs.dir }}/package.json

      - name: Setup pinned pnpm fallback
        if: steps.pnpm-project.outputs.dir != '' && steps.pnpm-project.outputs.has_package_manager != 'true'
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 11.5.2

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 22

      - name: Install pnpm dependencies
        if: steps.pnpm-project.outputs.dir != ''
        run: pnpm -C "${{ steps.pnpm-project.outputs.dir }}" install --frozen-lockfile

      - name: Run perf enforcement
        env:
          PERF_BUILD_MAX_RATIO: "2.00"
        run: |
          if [ -f ./.codex/scripts/run_perf_enforced.sh ]; then
            bash ./.codex/scripts/run_perf_enforced.sh
          else
            echo "No perf enforcement script found; skipping."
          fi

      - name: Upload perf artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: perf-enforced
          path: .perf-results/**
          include-hidden-files: true
          if-no-files-found: ignore
